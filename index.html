<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<script src="./file/jquery.min.js"></script>
<script src="./file/jscex.min.js"></script>
<script src="./file/jscex-parser.js"></script>
<script src="./file/jscex-jit.js"></script>
<script src="./file/jscex-builderbase.min.js"></script>
<script src="./file/jscex-async.min.js"></script>
<script src="./file/jscex-async-powerpack.min.js"></script>
<script src="./file/functions.js"></script>
<script src="./file/love.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #ffe;
  overflow: hidden;
}

/* Canvas full */
#canvas {
  position: absolute;
  left: 0;
  top: 0;
  transition: all 1.5s ease;
}

/* Shift canvas */
.shift {
  transform: translateX(-250px) scale(0.8);
}

/* Envelope */
.envelope {
  position: absolute;
  right: 100px;
  top: 150px;
  width: 320px;
  height: 220px;
  display: none;
  cursor: pointer;
}

.envelope.show {
  display: block;
}

/* Envelope design */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(45deg, #ff6f91, #ffb6b9);
  border-radius: 10px;
  transform-origin: top;
  transition: 0.8s;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

.letter {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #fffdf5;
  padding: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  font-family: 'Dancing Script', cursive;
  opacity: 0;
  transform: translateY(50px);
  transition: 1s;
  border-radius: 10px;
}

.envelope.open .letter {
  opacity: 1;
  transform: translateY(0);
}

/* Text animation */
.line {
  opacity: 0;
  transform: translateY(20px);
  animation: showLine 1s forwards;
}

.line:nth-child(1){animation-delay:1s;}
.line:nth-child(2){animation-delay:2.5s;}
.line:nth-child(3){animation-delay:4s;}
.line:nth-child(4){animation-delay:5.5s;}

@keyframes showLine {
  to {opacity:1; transform:translateY(0);}
}

/* Firework */
.firework {
  position: fixed;
  width: 5px;
  height: 5px;
  background: red;
  border-radius: 50%;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  from {transform: scale(1); opacity:1;}
  to {transform: scale(20); opacity:0;}
}
</style>

<script>
function showEnvelope() {
  document.getElementById("canvas").classList.add("shift");
  document.querySelector(".envelope").classList.add("show");
}

function openLetter() {
  document.querySelector(".envelope").classList.add("open");
  launchFireworks();
}

/* Firecracker */
function launchFireworks() {
  for(let i=0;i<20;i++){
    let f = document.createElement("div");
    f.className = "firework";
    f.style.left = Math.random()*100+"vw";
    f.style.top = Math.random()*100+"vh";
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1000);
  }
}
</script>

</head>

<body>

<canvas id="canvas" width="1100" height="680"></canvas>

<!-- Envelope -->
<div class="envelope" onclick="openLetter()">
  <div class="flap"></div>
  <div class="letter">
    <p class="line">Happy Birthday Parshi 🎈</p>
    <p class="line">My beautiful wife 💕</p>
    <p class="line">May God bless you 🍀</p>
    <p class="line">I love you forever ❤️</p>
  </div>
</div>

<script>
(function() {
    var canvas = $('#canvas');
    if (!canvas[0].getContext) return;

    var width = canvas.width();
    var height = canvas.height();
    canvas.attr("width", width);
    canvas.attr("height", height);

    var opts = {
        seed: { x: width/2-20, color:"rgb(190,26,37)", scale:2 },
        branch: [[535,680,570,250,500,200,30,100]],
        bloom: { num:500, width:1080, height:650 },
        footer: { width:1200, height:5, speed:10 }
    };

    var tree = new Tree(canvas[0], width, height, opts);
    var seed = tree.seed, foot = tree.footer, hold=1;

    canvas.click(function(){ hold=0; });

    var seedAnimate = eval(Jscex.compile("async", function () {
        seed.draw();
        while(hold){ $await(Jscex.Async.sleep(10)); }
        while(seed.canScale()){
            seed.scale(0.95);
            $await(Jscex.Async.sleep(10));
        }
        while(seed.canMove()){
            seed.move(0,2);
            foot.draw();
            $await(Jscex.Async.sleep(10));
        }
    }));

    var growAnimate = eval(Jscex.compile("async", function () {
        do{
            tree.grow();
            $await(Jscex.Async.sleep(10));
        }while(tree.canGrow());
    }));

    var flowAnimate = eval(Jscex.compile("async", function () {
        do{
            tree.flower(2);
            $await(Jscex.Async.sleep(10));
        }while(tree.canFlower());
    }));

    var runAsync = eval(Jscex.compile("async", function () {
        $await(seedAnimate());
        $await(growAnimate());
        $await(flowAnimate());

        // after tree complete → show envelope
        setTimeout(showEnvelope, 1000);
    }));

    runAsync().start();
})();
</script>

</body>
</html>
