<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<script src="./file/jquery.min.js"></script>
<script src="./file/jscex.min.js"></script>
<script src="./file/jscex-parser.js"></script>
<script src="./file/jscex-jit.js"></script>
<script src="./file/jscex-builderbase.min.js"></script>
<script src="./file/jscex-async.min.js"></script>
<script src="./file/jscex-async-powerpack.min.js"></script>
<script src="./file/functions.js"></script>
<script src="./file/love.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  overflow:hidden;

  /* ✅ ORIGINAL STYLE BACKGROUND */
  background: url('./file/bg.jpg') no-repeat center center fixed;
  background-size: cover;
}

/* canvas */
#canvas {
  position:absolute;
  left:0;
  top:0;
  transition:1.5s;
}

.shift {
  transform:translateX(-250px) scale(0.8);
}

/* envelope */
.envelope {
  position:absolute;
  right:80px;
  top:150px;
  width:320px;
  height:220px;
  display:none;
  cursor:pointer;
}

.envelope.show { display:block; }

.flap {
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(45deg,#ff4d6d,#ffb3c1);
  border-radius:15px;
  transform-origin:top;
  transition:.8s;
}

.envelope.open .flap {
  transform:rotateX(180deg);
}

.letter {
  position:absolute;
  width:100%;
  height:100%;
  background:#fffdf5;
  padding:20px;
  font-family:'Dancing Script',cursive;
  opacity:0;
  transform:translateY(50px);
  transition:1s;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,.3);
}

.envelope.open .letter {
  opacity:1;
  transform:translateY(0);
}

/* text */
.line {
  opacity:0;
  transform:translateY(20px);
  animation:showLine 1s forwards;
}

.line:nth-child(1){animation-delay:1s;}
.line:nth-child(2){animation-delay:2.5s;}
.line:nth-child(3){animation-delay:4s;}
.line:nth-child(4){animation-delay:5.5s;}

@keyframes showLine {
  to {opacity:1; transform:translateY(0);}
}

/* FIREWORK */
.rocket {
  position:fixed;
  bottom:0;
  width:3px;
  height:20px;
  background:white;
  animation:rocketUp 1s linear forwards;
}

@keyframes rocketUp {
  to { transform:translateY(-80vh); }
}

.spark {
  position:fixed;
  width:5px;
  height:5px;
  border-radius:50%;
  animation:spark 1s ease-out forwards;
}

@keyframes spark {
  from {opacity:1;}
  to {transform:translate(var(--x), var(--y)); opacity:0;}
}
</style>

<script>
let audio;

function showEnvelope() {
  document.getElementById("canvas").classList.add("shift");
  document.querySelector(".envelope").classList.add("show");
}

function openLetter() {
  document.querySelector(".envelope").classList.add("open");
  audio.play();
  startFireworks();
}

/* fireworks */
function createFirework() {
  let rocket = document.createElement("div");
  rocket.className = "rocket";
  rocket.style.left = Math.random()*100+"vw";
  document.body.appendChild(rocket);

  setTimeout(() => {
    let x = rocket.getBoundingClientRect().left;
    let y = rocket.getBoundingClientRect().top;
    rocket.remove();

    for(let i=0;i<30;i++){
      let s = document.createElement("div");
      s.className="spark";
      s.style.left=x+"px";
      s.style.top=y+"px";

      let angle = Math.random()*360;
      let dist = Math.random()*80;

      s.style.setProperty("--x", Math.cos(angle)*dist+"px");
      s.style.setProperty("--y", Math.sin(angle)*dist+"px");

      s.style.background = `hsl(${Math.random()*360},100%,50%)`;

      document.body.appendChild(s);
      setTimeout(()=>s.remove(),1000);
    }
  },1000);
}

function startFireworks() {
  [1000,2500,4000,5500,7000,9000].forEach(t=>{
    setTimeout(createFirework,t);
  });
}

window.onload = () => {
  audio = document.getElementById("myAudio");
};
</script>

</head>

<body>

<audio id="myAudio">
  <source src="aud.mp3" type="audio/mp3">
</audio>

<canvas id="canvas" width="1100" height="680"></canvas>

<div class="envelope" onclick="openLetter()">
  <div class="flap"></div>
  <div class="letter">
    <p class="line">Happy Birthday Parshi 🎈</p>
    <p class="line">My beautiful wife 💕</p>
    <p class="line">May God bless you 🍀</p>
    <p class="line">I love you forever ❤️</p>
  </div>
</div>

<script>
(function() {
    var canvas = $('#canvas');
    if (!canvas[0].getContext) return;

    var width = canvas.width();
    var height = canvas.height();
    canvas.attr("width", width);
    canvas.attr("height", height);

    var opts = {
        seed:{x:width/2-20,color:"rgb(190,26,37)",scale:2},
        branch:[[535,680,570,250,500,200,30,100]],
        bloom:{num:500,width:1080,height:650},
        footer:{width:1200,height:5,speed:10}
    };

    var tree = new Tree(canvas[0], width, height, opts);
    var seed = tree.seed, foot = tree.footer, hold=1;

    canvas.click(function(){ hold=0; });

    var seedAnimate = eval(Jscex.compile("async", function () {
        seed.draw();
        while(hold){ $await(Jscex.Async.sleep(10)); }
        while(seed.canScale()){
            seed.scale(0.95);
            $await(Jscex.Async.sleep(10));
        }
        while(seed.canMove()){
            seed.move(0,2);
            foot.draw();
            $await(Jscex.Async.sleep(10));
        }
    }));

    var growAnimate = eval(Jscex.compile("async", function () {
        do{
            tree.grow();
            $await(Jscex.Async.sleep(10));
        }while(tree.canGrow());
    }));

    var flowAnimate = eval(Jscex.compile("async", function () {
        do{
            tree.flower(2);
            $await(Jscex.Async.sleep(10));
        }while(tree.canFlower());
    }));

    var runAsync = eval(Jscex.compile("async", function () {
        $await(seedAnimate());
        $await(growAnimate());
        $await(flowAnimate());

        setTimeout(showEnvelope,1000);
    }));

    runAsync().start();
})();
</script>

</body>
</html>
