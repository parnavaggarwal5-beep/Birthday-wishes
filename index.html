<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<script src="./file/jquery.min.js"></script>
<script src="./file/jscex.min.js"></script>
<script src="./file/jscex-parser.js"></script>
<script src="./file/jscex-jit.js"></script>
<script src="./file/jscex-builderbase.min.js"></script>
<script src="./file/jscex-async.min.js"></script>
<script src="./file/jscex-async-powerpack.min.js"></script>
<script src="./file/functions.js"></script>
<script src="./file/love.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: linear-gradient(#ffe, #ffd6e0);
  text-align: center;
  overflow-x: hidden;
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  color: red;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity:1; }
  100% { transform: translateY(-100vh); opacity:0; }
}

/* Envelope */
.envelope {
  position: relative;
  width: 320px;
  height: 220px;
  margin: 60px auto;
  cursor: pointer;
  perspective: 1000px;
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ff6f91;
  transform-origin: top;
  transition: transform 0.8s;
  z-index: 2;
}

.envelope.open .flap {
  transform: rotateX(180deg);
}

/* Letter */
.letter {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #fffdf5;
  padding: 20px;
  box-sizing: border-box;
  opacity: 0;
  transform: translateY(60px);
  transition: all 1s ease;
  font-family: 'Dancing Script', cursive;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  border-radius: 10px;
}

.envelope.open .letter {
  opacity: 1;
  transform: translateY(0);
}

/* Text animation */
.line {
  opacity: 0;
  transform: translateY(20px);
  animation: showLine 1s ease forwards;
  font-size: 22px;
}

.line:nth-child(1) { animation-delay: 1s; }
.line:nth-child(2) { animation-delay: 2.5s; }
.line:nth-child(3) { animation-delay: 4s; }
.line:nth-child(4) { animation-delay: 5.5s; }

@keyframes showLine {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Canvas */
#canvas {
  margin-top: 20px;
}
</style>

<script>
function openLetter() {
  document.querySelector(".envelope").classList.add("open");
}

function playAudio() {
  document.getElementById("myAudio").play();
}

/* Floating hearts generator */
function createHearts() {
  setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
  }, 300);
}

window.onload = createHearts;
</script>

</head>

<body>

<audio autoplay loop id="myAudio">
  <source src="aud.mp3" type="audio/mp3">
</audio>

<div class="envelope" onclick="openLetter(); playAudio();">
  <div class="flap"></div>

  <div class="letter">
    <p class="line">Happy Birthday 🎈</p>
    <p class="line">My beautiful wife 💕</p>
    <p class="line">May God bless you always 🍀</p>
    <p class="line">I love you forever ❤️</p>
  </div>
</div>

<canvas id="canvas" width="1100" height="680"></canvas>

<script>
(function() {
    var canvas = $('#canvas');

    if (!canvas[0].getContext) return;

    var width = canvas.width();
    var height = canvas.height();
    canvas.attr("width", width);
    canvas.attr("height", height);

    var opts = {
        seed: {
            x: width / 2 - 20,
            color: "rgb(190, 26, 37)",
            scale: 2
        },
        branch: [
            [535, 680, 570, 250, 500, 200, 30, 100]
        ],
        bloom: {
            num: 500,
            width: 1080,
            height: 650,
        },
        footer: {
            width: 1200,
            height: 5,
            speed: 10,
        }
    };

    var tree = new Tree(canvas[0], width, height, opts);
    var seed = tree.seed;
    var foot = tree.footer;
    var hold = 1;

    canvas.click(function() {
        hold = 0;
    });

    var seedAnimate = eval(Jscex.compile("async", function () {
        seed.draw();
        while (hold) {
            $await(Jscex.Async.sleep(10));
        }
        while (seed.canScale()) {
            seed.scale(0.95);
            $await(Jscex.Async.sleep(10));
        }
        while (seed.canMove()) {
            seed.move(0, 2);
            foot.draw();
            $await(Jscex.Async.sleep(10));
        }
    }));

    var growAnimate = eval(Jscex.compile("async", function () {
        do {
            tree.grow();
            $await(Jscex.Async.sleep(10));
        } while (tree.canGrow());
    }));

    var flowAnimate = eval(Jscex.compile("async", function () {
        do {
            tree.flower(2);
            $await(Jscex.Async.sleep(10));
        } while (tree.canFlower());
    }));

    var runAsync = eval(Jscex.compile("async", function () {
        $await(seedAnimate());
        $await(growAnimate());
        $await(flowAnimate());
    }));

    runAsync().start();
})();
</script>

</body>
</html>
